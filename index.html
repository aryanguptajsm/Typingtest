<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test</title>
</head>
<body>

    <div class="container">

        <h1>Typing Speed Test</h1>

        <p id="text">
            JavaScript is awesome and I want to become a JavaScript Master.
        </p>

        <textarea
            id="input"
            rows="6"
            placeholder="Start typing here..."
        ></textarea>

        <div class="info">

            <p>
                ⏱ Time:
                <span id="time">0.00</span> sec
            </p>

            <p>
                🎯 Accuracy:
                <span id="accuracy">100%</span>
            </p>

            <p>
                ⌨ Characters:
                <span id="characters">0</span>
            </p>

        </div>

        <button id="start">Start</button>
        <button id="restart">Restart</button>

        <h2 id="result"></h2>

    </div>

</body>
</html>
